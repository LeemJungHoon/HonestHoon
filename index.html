<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HonestHoon</title>
    <link href="index.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Arima:wght@100..700&family=Luckiest+Guy&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nanum+Brush+Script&family=Rock+Salt&family=Sacramento&display=swap"
      rel="stylesheet"
    />

    <style>
      .wrap {
        display: flex;
        flex-direction: column;
      }

      .banner {
        display: flex;
        flex-direction: column;
        margin: 17% auto;
        height: 100vh;
      }

      .banner h2 {
        font-size: 128px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        animation: mask 1.2s 1 linear forwards;
      }

      /* .banner h2::after {
        background: white;
        width: 100%;
        height: 100%;
        content: "";
        position: absolute;
        top: 0;
        left: 0;

        
      } */

      @keyframes mask {
        0% {
          transform: translateX(-100px);
          /* transform: translateY(-100px); */
        }

        100% {
          transform: translateX(0px);
          /* transform: translateY(0px); */
        }
      }

      .banner .banner-myIntro {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin-top: 7%;
        font-size: 48px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="banner">
        <h2>Leem Jung Hoon</h2>
        <div class="banner-myIntro">
          <span>1994.11.26</span>
          <span>남자</span>
          <span>INTP</span>
          <span>군필(만기전역)</span>
          <span>음악취향 : 랩</span>
          <span>아재개그</span>
          <span>Web Front-End Developer</span>
          <span>ㅇㅇ사의 준비된 신입</span>
        </div>
      </div>
    </div>
  </body>
</html>
