<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HonestHoon</title>
    <link href="index.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Allura&family=Arima:wght@100..700&family=Luckiest+Guy&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nanum+Brush+Script&family=Rock+Salt&family=Sacramento&display=swap"
      rel="stylesheet"
    />

    <style>
      .wrap {
        display: flex;
        flex-direction: column;
      }

      .banner {
        display: flex;
        flex-direction: column;
        margin: 17% auto;
        height: 100vh;
      }

      .banner h2 {
        font-size: 128px;
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        position: relative;
        animation: mask 4s 1 linear forwards;
      }

      /* .banner h2::after {
        background: white;
        width: 100%;
        height: 100%;
        content: "";
        position: absolute;
        top: 0;
        left: 0;

        
      } */

      @keyframes mask {
        0% {
          transform: translateY(-200px);
          /* transform: translateY(-100px); */
        }

        100% {
          transform: translateY(80px);
          /* transform: translateY(0px); */
        }
      }

      .banner .myIntroduce {
        display: flex;
        justify-content: center;
        align-items: center;
        text-align: center;
        margin-top: 7%;
        font-size: 48px;
        position: relative;
      }

      .banner .myIntroduce .content {
        position: absolute;
        top: 0;
      }
    </style>
    <script>
      window.onload = () => {
        myIntroContentSwap();
      };

      const myIntroContentSwap = () => {
        const content = document.querySelectorAll(`.myIntroduce .content`);

        content.forEach((item, idx) => {
          new Promise((resolve, reject) => {
            setTimeout(() => {
              item.style.opacity = 1;
              resolve(0);
            }, idx * 300);
          })
            .then((value) => {
              setTimeout(() => {
                item.style.opacity = 0;
              }, 300);
            })
            .catch((err) => {
              console.log("myIntroContentSwap에러 :" + err);
            });
        });
      };
    </script>
  </head>
  <body>
    <div class="wrap">
      <div class="banner">
        <h2>Leem Jung Hoon</h2>
        <div class="myIntroduce">
          <div class="content" style="opacity: 0">1994.11.26</div>
          <div class="content" style="opacity: 0">남자</div>
          <div class="content" style="opacity: 0">서일대졸업</div>
          <div class="content" style="opacity: 0">군필(병 만기전역)</div>
          <div class="content" style="opacity: 0">영화 lover</div>
          <div class="content" style="opacity: 0">인생업적 마빵단</div>
          <div class="content" style="opacity: 0">INTP</div>
          <div class="content" style="opacity: 0">랩 좋아함</div>
          <div class="content" style="opacity: 0">Web Front-End Developer</div>
          <div class="content" style="opacity: 0">삼성의 준비된 신입</div>
        </div>
      </div>
    </div>
  </body>
</html>
